services:
  db:
    image: postgres:15-alpine
    container_name: liveklass-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liveklass}
      POSTGRES_USER: ${POSTGRES_USER:-liveklass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liveklass}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
